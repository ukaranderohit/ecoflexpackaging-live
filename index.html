<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoFlex Packaging</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body{font-family:Poppins,sans-serif;margin:0;background:#f7fbf8}
    .container{width:92%;max-width:1180px;margin:auto}
    section{padding:80px 0}
    .section-title{text-align:center;font-size:2rem;color:#1b5e20}
    .section-subtitle{text-align:center;color:#666;margin-bottom:40px}

    .products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
    .product-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 10px 20px rgba(0,0,0,0.08)}
    .product-card img{width:100%;height:250px;object-fit:cover}
    .product-card-content{padding:15px}
  </style>
</head>

<body>

<section id="products">
  <div class="container">
    <h2 class="section-title">Our Products / Our Happy Customers</h2>
    <p class="section-subtitle">Our real printed bag samples</p>

    <div class="products-grid">
      <div class="product-card"><img src="products/product1.jpg"><div class="product-card-content">Sample 1</div></div>
      <div class="product-card"><img src="products/product2.jpg"><div class="product-card-content">Sample 2</div></div>
      <div class="product-card"><img src="products/product3.jpg"><div class="product-card-content">Sample 3</div></div>
      <div class="product-card"><img src="products/product4.jpg"><div class="product-card-content">Sample 4</div></div>
      <div class="product-card"><img src="products/product5.jpg"><div class="product-card-content">Sample 5</div></div>
      <div class="product-card"><img src="products/product6.jpg"><div class="product-card-content">Sample 6</div></div>
    </div>
  </div>
</section>

</body>
</html>
